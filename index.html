<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Widget - (c) Fajar Setya Budi</title>
    <link rel="stylesheet" href="dist/css/whatsapp-widget.min.css">
    <style>
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<!-- Popup Whatsapp button on right of page-->

    <!-- Built in form -->
    <form id="general-support" class="wa-widget" action="447946403628" data-chat="general-support"></form>

    <script src="dist/js/whatsapp-widget.min.js"></script>
    <script>
        var generalSupport = new WhatsAppWidget(document.getElementById('general-support'), {
            name: 'Fajar Setya',
            division: 'General Supports',
            photo: 'images/user.png',
            introduction: 'Hi there 👋 \n How can I help you?',
        }, [
            {
                data: 'name',
                type: 'text',
                required: true
            }, {
                data: 'email',
                type: 'email',
                required: true
            }, {
                data: 'message',
                type: 'text',
                required: true
            }
        ]);

        // ❌ removed auto open
        // generalSupport.toggle()

        // ✅ CLOSE BUTTON INSIDE HEADER (FIXED POSITION)
        document.addEventListener("DOMContentLoaded", function () {
            setTimeout(function () {

                var header = document.querySelector('#general-support .chat-header');

                if (!header) return;

                header.style.position = "relative";

                var closeBtn = document.createElement("span");
                closeBtn.innerHTML = "×";

                closeBtn.style.position = "absolute";
                closeBtn.style.top = "8px";
                closeBtn.style.right = "10px";
                closeBtn.style.cursor = "pointer";
                closeBtn.style.fontSize = "18px";
                closeBtn.style.fontWeight = "bold";
                closeBtn.style.zIndex = "9999";

                closeBtn.onclick = function () {
                    generalSupport.toggle();
                };

                header.appendChild(closeBtn);

            }, 500);
        });
    </script>
  

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

/* OUTER WRAPPER */
.ba-container {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: auto;
  aspect-ratio: 16 / 9;
  display: flex;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* BOTH PANES */
.ba-before,
.ba-after {
  height: 100%;
  overflow: hidden;
  position: relative;
}

.ba-before img,
.ba-after img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* INITIAL SPLIT */
.ba-before {
  width: 50%;
}
.ba-after {
  width: 50%;
}

/* HANDLE */
.ba-handle {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: #fff;
  cursor: ew-resize;
  z-index: 10;
}

.ba-handle::after {
  content: "SLIDE ⇆";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  background: #fff;
  padding: 10px 16px;
  border-radius: 30px;

  font-size: 12px;
  font-weight: bold;
  letter-spacing: 1px;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;

  box-shadow: 0 3px 10px rgba(0,0,0,0.25);
  white-space: nowrap;
}


/* LABELS */
.ba-label {
  position: absolute;
  top: 12px;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: bold;
  color: #fff;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  z-index: 11;
  pointer-events: none;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.ba-label.before {
  left: 12px;
}

.ba-label.after {
  right: 12px;
}

/* 📱 MOBILE TWEAKS */
@media (max-width: 768px) {

  body {
    padding: 10px;
  }

  .ba-container {
    aspect-ratio: 4 / 3;
    border-radius: 10px;
  }

  .ba-label {
    font-size: 10px;
    padding: 4px 10px;
  }

  .ba-handle::after {
    @media (max-width: 768px) {
  .ba-handle::after {
    content: "SLIDE\A⇆";
    white-space: pre;
    
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    font-size: 10px;
    padding: 8px 10px;
    line-height: 1.2;
  }
}
</style>

</head>
<body>

<h2>Before & After Slider</h2>

<div class="ba-container" id="slider">

  <!-- BEFORE -->
  <div class="ba-before">
    <img src="before_20260412_162839_0000.jpg">
  </div>

  <!-- AFTER -->
  <div class="ba-after">
    <img src="after_20260412_162918_0000.jpg">
  </div>

  <!-- LABELS -->
  <span class="ba-label before">Before</span>
  <span class="ba-label after">After</span>

  <!-- HANDLE -->
  <div class="ba-handle"></div>

</div>

<script>
const container = document.getElementById('slider');
const before = container.querySelector('.ba-before');
const after = container.querySelector('.ba-after');
const handle = container.querySelector('.ba-handle');

let isDragging = false;

function moveSlider(clientX) {
  const rect = container.getBoundingClientRect();
  let x = clientX - rect.left;

  if (x < 0) x = 0;
  if (x > rect.width) x = rect.width;

  const percent = (x / rect.width) * 100;

  before.style.width = percent + "%";
  after.style.width = (100 - percent) + "%";
  handle.style.left = percent + "%";
}

/* DESKTOP */
handle.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  moveSlider(e.clientX);
});

/* MOBILE (IMPORTANT IMPROVEMENT) */
container.addEventListener('touchstart', () => isDragging = true);
window.addEventListener('touchend', () => isDragging = false);

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  moveSlider(e.touches[0].clientX);
});
</script>

    
<style>
/* FORCE WHATSAPP WIDGET TO TOP */
#general-support,
.wa-widget {
  position: fixed !important;
  bottom: 20px !important;
  right: 20px !important;
  z-index: 2147483647 !important; /* MAX layer */
}

/* When popup opens */
.wa-widget.active,
.wa-widget.open {
  z-index: 2147483647 !important;
}
</style>
    

    
</body>
</html>
