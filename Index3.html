<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Floating Button */
.whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    border-radius: 50px;
    padding: 12px 16px;
    font-size: 16px;
    cursor: pointer;
    z-index: 999;
}

/* Chat Box */
.whatsapp-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    max-width: 90%;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: none; /* ❗ hidden by default */
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
}

/* Header */
.whatsapp-header {
    background: #25D366;
    color: white;
    padding: 10px;
    font-weight: bold;
    position: relative;
}

/* Close Button */
.close-btn {
    position: absolute;
    right: 10px;
    top: 5px;
    cursor: pointer;
    font-size: 18px;
}

/* Body */
.whatsapp-body {
    padding: 15px;
    font-size: 14px;
}

/* Chat Button */
.whatsapp-start {
    display: block;
    background: #25D366;
    color: white;
    text-align: center;
    padding: 10px;
    text-decoration: none;
}

/* Mobile tweaks */
@media (max-width: 480px) {
    .whatsapp-box {
        right: 10px;
        bottom: 70px;
        width: 95%;
    }
}
</style>
</head>

<body>

<!-- Floating Button -->
<div class="whatsapp-btn" onclick="openWidget()">
    💬 Chat with us
</div>

<!-- Chat Widget -->
<div class="whatsapp-box" id="whatsappBox">
    
    <div class="whatsapp-header">
        Chat with us
        <span class="close-btn" onclick="closeWidget()">×</span>
    </div>

    <div class="whatsapp-body">
        Hi 👋<br><br>
        Thank you for contacting us.<br>
        How can we help you?
    </div>

    <a class="whatsapp-start" 
       href="https://wa.me/447946123123?text=Hi%20I%20need%20help" 
       target="_blank">
       Start Chat
    </a>

</div>

<script>
function openWidget() {
    document.getElementById("whatsappBox").style.display = "flex";
}

function closeWidget() {
    document.getElementById("whatsappBox").style.display = "none";
}
</script>

</body>
</html>
